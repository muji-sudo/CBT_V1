<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT Pro - Anti Cheat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .cbt-container { max-width: 800px; margin: 50px auto; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .header-ujian { background: #1a237e; color: white; padding: 15px; border-radius: 15px 15px 0 0; }
        .timer { font-size: 1.5rem; font-weight: bold; color: #ffeb3b; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container cbt-container">
    <div id="login-box" class="card p-4">
        <h3 class="text-center mb-4">MASUK CBT ONLINE</h3>
        <div class="mb-3">
            <label>Nama Lengkap Siswa</label>
            <input type="text" id="nama" class="form-control" placeholder="Input Nama...">
        </div>
        <div class="mb-3">
            <label>Sandi Ujian</label>
            <input type="password" id="sandi" class="form-control" placeholder="Sandi: 1234">
        </div>
        <button onclick="login()" class="btn btn-primary w-100">Mulai Masuk</button>
    </div>

    <div id="exam-box" class="hidden">
        <div class="header-ujian d-flex justify-content-between align-items-center">
            <div id="info-siswa">Siswa: -</div>
            <div class="timer" id="timer">60:00</div>
        </div>
        <div class="card p-4 mt-3">
            <div id="soal-container"></div>
            <hr>
            <div class="d-flex justify-content-between">
                <button id="prev" class="btn btn-secondary" onclick="pindahSoal(-1)">Sebelumnya</button>
                <button id="next" class="btn btn-primary" onclick="pindahSoal(1)">Berikutnya / Selesai</button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- KONFIGURASI FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyBGl1WySSrPU_86T0SOKi0FhpMdAw8NXLs",
        databaseURL: "https://cbt-v1-c3387-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- DATA SOAL ---
    const dataSoal = [
        { q: "Apa nama ibukota Indonesia?", a: "Jakarta", b: "Bali", c: "Bandung", d: "Medan", k: "A" },
        { q: "Hasil dari 5 x 5 adalah...", a: "10", b: "20", c: "25", d: "30", k: "C" }
    ];

    let currentIdx = 0;
    let jawabanSiswa = {};
    let sisaWaktu = 3600; // 60 menit

    function login() {
        const n = document.getElementById('nama').value;
        const s = document.getElementById('sandi').value;
        if(n && s === "1234") {
            document.getElementById('login-box').classList.add('hidden');
            document.getElementById('exam-box').classList.remove('hidden');
            document.getElementById('info-siswa').innerText = "Siswa: " + n;
            tampilkanSoal();
            startTimer();
            activateAntiCheat();
        } else { alert("Data tidak sesuai!"); }
    }

    function tampilkanSoal() {
        let s = dataSoal[currentIdx];
        document.getElementById('soal-container').innerHTML = `
            <p class="fw-bold">Soal No ${currentIdx + 1}</p>
            <p>${s.q}</p>
            <div class="form-check mb-2"><input type="radio" name="ans" value="A" ${jawabanSiswa[currentIdx]=='A'?'checked':''}> A. ${s.a}</div>
            <div class="form-check mb-2"><input type="radio" name="ans" value="B" ${jawabanSiswa[currentIdx]=='B'?'checked':''}> B. ${s.b}</div>
            <div class="form-check mb-2"><input type="radio" name="ans" value="C" ${jawabanSiswa[currentIdx]=='C'?'checked':''}> C. ${s.c}</div>
            <div class="form-check mb-2"><input type="radio" name="ans" value="D" ${jawabanSiswa[currentIdx]=='D'?'checked':''}> D. ${s.d}</div>
        `;
    }

    function pindahSoal(arah) {
        let selected = document.querySelector('input[name="ans"]:checked');
        if(selected) jawabanSiswa[currentIdx] = selected.value;

        currentIdx += arah;
        if(currentIdx < 0) currentIdx = 0;
        if(currentIdx >= dataSoal.length) { kirimHasil("Selesai Jujur"); return; }
        tampilkanSoal();
    }

    function startTimer() {
        setInterval(() => {
            sisaWaktu--;
            let m = Math.floor(sisaWaktu/60);
            let s = sisaWaktu % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if(sisaWaktu <= 0) kirimHasil("Waktu Habis");
        }, 1000);
    }

    function activateAntiCheat() {
        // Deteksi Pindah Tab
        window.onblur = () => kirimHasil("CURANG: Pindah Tab");
        // Deteksi Layar Terbelah (Split Screen / Resize)
        window.onresize = () => {
            if(window.innerWidth < 500) kirimHasil("CURANG: Split Screen/Kecilkan Layar");
        };
    }

    function kirimHasil(status) {
        let skor = 0;
        dataSoal.forEach((s, i) => { if(jawabanSiswa[i] == s.k) skor++; });
        let nilai = (skor / dataSoal.length) * 100;

        db.ref('hasil/' + Date.now()).set({
            nama: document.getElementById('nama').value,
            nilai: nilai,
            status: status,
            waktu: new Date().toLocaleString()
        }).then(() => {
            document.body.innerHTML = `<div class='container mt-5 text-center'><h1>Ujian Selesai</h1><h3>Nilai: ${nilai}</h3><p>Status: ${status}</p></div>`;
        });
    }
</script>
</body>
</html>
